$kind: http-request
name: Update Task
method: PATCH
url: "{{baseUrl}}/tasks/{{taskId}}"
order: 6000
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "id": "task_test_003",
      "name": "Test task 03",
      "status": "running",
      "progressPercentage": 80,
      "startedAt": "{{$isoTimestamp}}"
    }
