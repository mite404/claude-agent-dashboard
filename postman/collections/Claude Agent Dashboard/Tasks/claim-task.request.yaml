$kind: http-request
name: Claim Task
method: POST
url: '{{baseUrl}}/tasks/{{taskId}}/claim'
order: 4000
pathVariables:
  - key: taskId
    value: '{{taskId}}'
    description: The task ID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "claimedBy": "agent-name"
    }
