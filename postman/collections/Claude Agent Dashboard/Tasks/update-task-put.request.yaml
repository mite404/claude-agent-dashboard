$kind: http-request
name: Update Task (PUT)
method: PUT
url: '{{baseUrl}}/tasks/{{taskId}}'
order: 7000
pathVariables:
  - key: taskId
    value: '{{taskId}}'
    description: The task ID
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "status": "running",
      "progressPercentage": 50,
      "startedAt": "2026-04-24T18:00:00.000Z"
    }
